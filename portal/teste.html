<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Tech Refresh - Teste</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.container {
  background: white;
  padding: 40px;
  border-radius: 10px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.2);
  max-width: 400px;
  width: 100%;
}
h1 {
  margin: 0 0 10px 0;
  color: #333;
}
p {
  color: #666;
  margin: 0 0 30px 0;
}
.form-group {
  margin-bottom: 20px;
}
label {
  display: block;
  margin-bottom: 5px;
  color: #333;
  font-weight: bold;
}
input {
  width: 100%;
  padding: 12px;
  border: 1px solid #ddd;
  border-radius: 5px;
  font-size: 14px;
  box-sizing: border-box;
}
button {
  width: 100%;
  padding: 12px;
  background: #667eea;
  color: white;
  border: none;
  border-radius: 5px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
}
button:hover {
  background: #5568d3;
}
button:disabled {
  background: #ccc;
  cursor: not-allowed;
}
.error {
  background: #fee;
  border: 1px solid #fcc;
  color: #c33;
  padding: 10px;
  border-radius: 5px;
  margin-bottom: 20px;
  display: none;
}
.error.show {
  display: block;
}
.success {
  color: green;
  text-align: center;
  margin-top: 20px;
}
</style>
</head>
<body>
<div class="container">
<h1>Portal Tech Refresh</h1>
<p>Faça login para continuar</p>
<div id="error" class="error"></div>
<form id="form">
<div class="form-group">
<label>Email:</label>
<input type="email" id="email" required>
</div>
<div class="form-group">
<label>Senha:</label>
<input type="password" id="senha" required>
</div>
<button type="submit" id="btn">Entrar</button>
</form>
<div id="success" class="success"></div>
</div>

<script>
document.getElementById('form').onsubmit = function(e) {
  e.preventDefault();
  
  var btn = document.getElementById('btn');
  var error = document.getElementById('error');
  var success = document.getElementById('success');
  var email = document.getElementById('email').value;
  var senha = document.getElementById('senha').value;
  
  btn.disabled = true;
  btn.textContent = 'Entrando...';
  error.classList.remove('show');
  success.textContent = '';
  
  fetch('http://localhost:3002/api/auth/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email: email, senha: senha })
  })
  .then(function(res) {
    return res.json().then(function(data) {
      return { status: res.status, data: data };
    });
  })
  .then(function(result) {
    if (result.status === 200) {
      localStorage.setItem('token', result.data.token);
      localStorage.setItem('usuario', JSON.stringify(result.data.usuario));
      success.textContent = 'Login realizado! Redirecionando...';
      setTimeout(function() {
        window.location.href = '/home';
      }, 1000);
    } else {
      throw new Error(result.data.error || 'Erro ao fazer login');
    }
  })
  .catch(function(err) {
    error.textContent = err.message;
    error.classList.add('show');
    btn.disabled = false;
    btn.textContent = 'Entrar';
  });
};
</script>
</body>
</html>
