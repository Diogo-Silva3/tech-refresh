<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Tech Refresh</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', -apple-system, sans-serif; background: #f4f4f4; min-height: 100vh; }
.container { display: flex; min-height: 100vh; }

/* Sidebar */
.sidebar { width: 200px; background: #fff; border-right: 1px solid #e0e0e0; padding: 24px 0; }
.logo { padding: 0 20px 32px; font-size: 24px; font-weight: 700; color: #000; }
.nav-menu { list-style: none; }
.nav-section { padding: 0 20px; margin-bottom: 24px; }
.nav-section-title { font-size: 11px; font-weight: 600; color: #6e6e6e; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.nav-item { margin-bottom: 4px; }
.nav-link { display: flex; align-items: center; gap: 10px; padding: 8px 12px; color: #5e5e5e; text-decoration: none; border-radius: 4px; font-size: 14px; transition: all 0.2s; }
.nav-link:hover { background: #f4f4f4; color: #000; }
.nav-link.active { background: #e8f4fd; color: #007dc1; font-weight: 600; }
.nav-icon { font-size: 16px; }
.nav-badge { margin-left: auto; background: #e0e0e0; color: #5e5e5e; font-size: 11px; font-weight: 600; padding: 2px 6px; border-radius: 10px; }

/* Main Content */
.main-content { flex: 1; padding: 32px 48px; }
.header { margin-bottom: 32px; }
.search-bar { width: 100%; max-width: 500px; padding: 10px 16px 10px 40px; border: 1px solid #d0d0d0; border-radius: 4px; font-size: 14px; background: #fff url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="%23999" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>') no-repeat 12px center; }
.search-bar:focus { outline: none; border-color: #007dc1; }
.content-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
.content-title { font-size: 24px; font-weight: 600; color: #000; }
.filter-btn { padding: 8px 16px; border: 1px solid #d0d0d0; background: #fff; border-radius: 4px; font-size: 14px; color: #5e5e5e; cursor: pointer; display: flex; align-items: center; gap: 8px; }
.filter-btn:hover { background: #f4f4f4; }
.section { margin-bottom: 40px; }
.section-header { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid #e0e0e0; }
.section-icon { font-size: 18px; }
.section-title { font-size: 16px; font-weight: 600; color: #5e5e5e; }

/* Apps Grid */
.apps-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; }
.app-card { background: #fff; border: 1px solid #e0e0e0; border-radius: 4px; padding: 20px; text-align: center; cursor: pointer; text-decoration: none; color: inherit; position: relative; transition: all 0.2s; }
.app-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.1); border-color: #d0d0d0; }
.app-menu { position: absolute; top: 8px; right: 8px; width: 24px; height: 24px; border-radius: 4px; display: flex; align-items: center; justify-content: center; color: #999; cursor: pointer; opacity: 0; transition: opacity 0.2s; }
.app-card:hover .app-menu { opacity: 1; }
.app-menu:hover { background: #f4f4f4; color: #000; }
.app-icon { width: 72px; height: 72px; margin: 0 auto 16px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 24px; background: #f4f4f4; }
.app-icon img { width: 100%; height: 100%; object-fit: contain; border-radius: 8px; }
.app-name { font-size: 14px; font-weight: 500; color: #000; margin-bottom: 4px; }
.app-description { font-size: 12px; color: #999; }

/* User Menu */
.user-menu { position: fixed; top: 20px; right: 32px; }
.user-avatar { width: 36px; height: 36px; border-radius: 50%; background: #007dc1; display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; font-size: 14px; cursor: pointer; }
.user-dropdown { display: none; position: absolute; right: 0; top: 48px; background: white; border: 1px solid #e0e0e0; border-radius: 4px; box-shadow: 0 4px 16px rgba(0,0,0,0.15); min-width: 200px; z-index: 100; }
.user-dropdown.show { display: block; }
.user-info { padding: 16px; border-bottom: 1px solid #e0e0e0; }
.user-name { font-weight: 600; font-size: 14px; color: #000; margin-bottom: 4px; }
.user-email { font-size: 12px; color: #999; }
.logout-btn { width: 100%; text-align: left; padding: 12px 16px; font-size: 14px; color: #5e5e5e; background: none; border: none; cursor: pointer; }
.logout-btn:hover { background: #f4f4f4; }
</style>
</head>
<body>
<div class="container">
<aside class="sidebar">
<div class="logo"><img src="logo-ntt.png" alt="NTT Data" style="height: 32px;"></div>
<ul class="nav-menu">
<li class="nav-section">
<div class="nav-item"><a href="#" class="nav-link"><span class="nav-icon">📊</span> Dashboard</a></div>
</li>
<li class="nav-section">
<div class="nav-section-title">Apps</div>
<div class="nav-item"><a href="#" class="nav-link active"><span class="nav-icon">🏠</span> Meus apps</a></div>
<div class="nav-item"><a href="#" class="nav-link"><span class="nav-icon">📁</span> Work</a></div>
<div class="nav-item"><a href="#" class="nav-link"><span class="nav-icon">➕</span> Adicionar seção</a></div>
</li>
<li class="nav-section">
<div class="nav-item"><a href="#" class="nav-link"><span class="nav-icon">🔔</span> Notificações <span class="nav-badge">3</span></a></div>
</li>
</ul>
</aside>

<div class="main-content">
<div class="header">
<input type="text" class="search-bar" placeholder="Procurar apps">
</div>

<div class="content-header">
<h1 class="content-title">Meus apps</h1>
<button class="filter-btn">
<span>Classificar</span>
<span>▼</span>
</button>
</div>

<div class="section">
<div class="section-header">
<span class="section-icon">💼</span>
<h2 class="section-title">Work</h2>
</div>
<div class="apps-grid">
<a href="#" class="app-card" onclick="abrirApp('tech-refresh', event)">
<div class="app-menu">⋮</div>
<div class="app-icon" style="background: none; padding: 0;">
<img src="tech.png" alt="Tech Refresh" style="width: 100%; height: 100%; object-fit: contain;">
</div>
<div class="app-name">Tech Refresh</div>
</a>
<a href="#" class="app-card" onclick="abrirApp('assets', event)">
<div class="app-menu">⋮</div>
<div class="app-icon" style="background: none; padding: 0;">
<img src="asset.png" alt="Assets" style="width: 100%; height: 100%; object-fit: contain;">
</div>
<div class="app-name">Assets</div>
</a>
</div>
</div>
</div>
</div>

<div class="user-menu">
<div class="user-avatar" id="userAvatar">U</div>
<div class="user-dropdown" id="userDropdown">
<div class="user-info">
<div class="user-name" id="userName">Usuário</div>
<div class="user-email" id="userEmail">email@exemplo.com</div>
</div>
<button class="logout-btn" onclick="logout()">Sair</button>
</div>
</div>

<script>
var API_URL = window.location.origin + '/api';

var usuario = JSON.parse(localStorage.getItem('usuario') || '{}');
if (usuario.nome) {
  var iniciais = usuario.nome.split(' ').map(function(n) { return n[0]; }).join('').substring(0, 2).toUpperCase();
  document.getElementById('userAvatar').textContent = iniciais;
  document.getElementById('userName').textContent = usuario.nome;
  document.getElementById('userEmail').textContent = usuario.email || '';
}

document.getElementById('userAvatar').addEventListener('click', function(e) {
  e.stopPropagation();
  document.getElementById('userDropdown').classList.toggle('show');
});

document.addEventListener('click', function() {
  document.getElementById('userDropdown').classList.remove('show');
});

function logout() {
  var token = localStorage.getItem('token');
  if (token) {
    fetch(API_URL + '/auth/logout', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + token }
    }).catch(function(err) { console.error(err); });
  }
  localStorage.removeItem('token');
  localStorage.removeItem('usuario');
  window.location.href = '/login-final.html';
}

function abrirApp(sistema, event) {
  event.preventDefault();
  var token = localStorage.getItem('token');
  
  if (!token) {
    alert('Você precisa fazer login primeiro');
    window.location.href = '/login-final.html';
    return;
  }
  
  if (token) {
    fetch(API_URL + '/acesso/' + sistema, {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + token }
    }).catch(function(err) { console.error(err); });
  }
  
  // Obter token SSO usando o token do portal
  fetch(API_URL + '/sso/token/' + sistema, {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + token }
  })
  .then(function(res) { return res.json(); })
  .then(function(data) {
    if (data.token) {
      var urls = {
        'tech-refresh': 'https://tech-refresh.cloud/?token=' + encodeURIComponent(data.token),
        'assets': 'https://asset.tech-refresh.cloud/?token=' + encodeURIComponent(data.token)
      };
      window.open(urls[sistema], '_blank');
    } else {
      alert('Erro ao acessar ' + (sistema === 'tech-refresh' ? 'Tech Refresh' : 'Assets'));
    }
  })
  .catch(function(err) {
    console.error(err);
    alert('Erro ao acessar aplicação');
  });
}
</script>
</body>
</html>
